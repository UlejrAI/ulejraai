# This workflow builds and pushes Docker containers to Google Artifact Registry
# and deploys them on Cloud Run when commits are pushed to the "main" branch.
# Only apps under apps/ that have a root Dockerfile and were changed are deployed.
#
# To configure this workflow:
#
# 1. Enable the following Google Cloud APIs:
#
#    - Artifact Registry (artifactregistry.googleapis.com)
#    - Cloud Run (run.googleapis.com)
#    - IAM Credentials API (iamcredentials.googleapis.com)
#
#    You can learn more about enabling APIs at
#    https://support.google.com/googleapi/answer/6158841.
#
# 2. Create and configure a Workload Identity Provider for GitHub:
#    https://github.com/google-github-actions/auth#preferred-direct-workload-identity-federation.
#
#    Depending on how you authenticate, you will need to grant an IAM principal
#    permissions on Google Cloud:
#
#    - Artifact Registry Administrator (roles.artifactregistry.admin)
#    - Cloud Run Developer (roles/run.developer)
#
#    You can learn more about setting IAM permissions at
#    https://cloud.google.com/iam/docs/manage-access-other-resources
#
# 3. Change the values in the "env" block to match your values.

name: "Build and Deploy to Cloud Run"

on:
    push:
        branches:
            - main
        paths:
            - "apps/**"

env:
    PROJECT_ID: "ulejraai"
    REGION: "europe-west1"
    IMAGE_REPO: "europe-west1-docker.pkg.dev/ulejraai/ulejraai"
    REGISTRY: "europe-west1-docker.pkg.dev"
    WORKLOAD_IDENTITY_PROVIDER: "projects/481969206534/locations/global/workloadIdentityPools/github-action/providers/github-actions"

jobs:
    detect-changes:
        runs-on: "ubuntu-latest"
        permissions:
            contents: "read"
        outputs:
            services: ${{ steps.changes.outputs.services }}
        steps:
            - name: "Checkout"
              uses: "actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332" # actions/checkout@v4
              with:
                  fetch-depth: 0

            - id: "changes"
              name: "Detect changed apps with Dockerfile"
              run: |
                  if [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ] || [ -z "${{ github.event.before }}" ]; then
                      CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || git diff-tree --no-commit-id --name-only -r HEAD)
                  elif git cat-file -e "${{ github.event.before }}" 2>/dev/null; then
                      CHANGED=$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}")
                  else
                      CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || git diff-tree --no-commit-id --name-only -r HEAD)
                  fi

                  frontend_changed=false
                  MICROSERVICE_APPS=()

                  while IFS= read -r path; do
                      [ -z "$path" ] && continue
                      if [[ "$path" == apps/frontend/* ]]; then
                          # Frontend is a single monolithic app — track as one unit
                          frontend_changed=true
                      elif [[ "$path" == apps/microservices/* ]]; then
                          name="${path#apps/microservices/}"
                          name="${name%%/*}"
                          MICROSERVICE_APPS+=("apps/microservices/$name")
                      elif [[ "$path" == apps/tenant-platform* ]]; then
                          MICROSERVICE_APPS+=("apps/tenant-platform")
                      fi
                  done <<< "$CHANGED"

                  SERVICES='[]'
                  seen=""

                  # Frontend: deploy as a single service named "frontend"
                  if [ "$frontend_changed" = true ] && [ -f "apps/frontend/Dockerfile" ]; then
                      SERVICES=$(echo "$SERVICES" | jq -c \
                          '. + [{"app_path": "apps/frontend", "service_name": "frontend", "type": "frontend"}]')
                  fi

                  # Microservices: auto-detect by folder name
                  for app in $(printf '%s\n' "${MICROSERVICE_APPS[@]}" | sort -u); do
                      if [ -f "$app/Dockerfile" ] && [[ ! "$seen" == *"|$app|"* ]]; then
                          seen="$seen|$app|"
                          service_name="${app##*/}"
                          SERVICES=$(echo "$SERVICES" | jq -c \
                              --arg path "$app" \
                              --arg name "$service_name" \
                              '. + [{"app_path": $path, "service_name": $name, "type": "microservice"}]')
                      fi
                  done

                  echo "services=$SERVICES" >> "$GITHUB_OUTPUT"
                  echo "Deployable services: $SERVICES"

    deploy:
        runs-on: "ubuntu-latest"
        needs: detect-changes
        if: needs.detect-changes.outputs.services != '[]'
        strategy:
            matrix:
                include: ${{ fromJson(needs.detect-changes.outputs.services) }}
        permissions:
            contents: "read"
            id-token: "write"

        steps:
            - name: "Checkout"
              uses: "actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332" # actions/checkout@v4

            - id: "auth"
              name: "Authenticate to Google Cloud"
              uses: "google-github-actions/auth@f112390a2df9932162083945e46d439060d66ec2" # google-github-actions/auth@v2
              with:
                  workload_identity_provider: "${{ env.WORKLOAD_IDENTITY_PROVIDER }}"
                  project_id: "${{ env.PROJECT_ID }}"

            - name: "Docker Auth"
              uses: "docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567" # docker/login-action@v3
              with:
                  username: "oauth2accesstoken"
                  password: "${{ steps.auth.outputs.auth_token }}"
                  registry: "${{ env.REGISTRY }}"

            - name: "Build and Push Container"
              run: |
                  DOCKER_TAG="${{ env.IMAGE_REPO }}/${{ matrix.service_name }}:${{ github.sha }}"
                  docker build --tag "${DOCKER_TAG}" "${{ matrix.app_path }}"
                  docker push "${DOCKER_TAG}"

            - id: "deploy-frontend"
              name: "Deploy Frontend to Cloud Run"
              if: matrix.type == 'frontend'
              uses: "google-github-actions/deploy-cloudrun@33553064113a37d688aa6937bacbdc481580be17" # google-github-actions/deploy-cloudrun@v2
              with:
                  service: "${{ matrix.service_name }}"
                  region: "${{ env.REGION }}"
                  image: "${{ env.IMAGE_REPO }}/${{ matrix.service_name }}:${{ github.sha }}"
                  env_vars: |
                      AUTH_TRUST_HOST=true
                      EXTERNAL_BACKEND_URL=https://api.saloneledger.com
                  secrets: |
                      POSTGRES_URL=POSTGRES_URL:latest
                      AUTH_SECRET=AUTH_SECRET:latest
                      NEXTAUTH_SECRET=NEXTAUTH_SECRET:latest
                      MOONSHOT_API_KEY=MOONSHOT_API_KEY:latest
                      ALPHAVANTAGE_API_KEY=ALPHAVANTAGE_API_KEY:latest
                      COINMARKETCAP_API_KEY=COINMARKETCAP_API_KEY:latest
                      SMITHERY_API_KEY=SMITHERY_API_KEY:latest
                      TAVILY_API_KEY=TAVILY_API_KEY:latest
                      LLMROUTER_URL=LLMROUTER_URL:latest

            - id: "deploy-microservice"
              name: "Deploy Microservice to Cloud Run"
              if: matrix.type == 'microservice'
              uses: "google-github-actions/deploy-cloudrun@33553064113a37d688aa6937bacbdc481580be17" # google-github-actions/deploy-cloudrun@v2
              with:
                  service: "${{ matrix.service_name }}"
                  region: "${{ env.REGION }}"
                  image: "${{ env.IMAGE_REPO }}/${{ matrix.service_name }}:${{ github.sha }}"
                  secrets: |
                      MOONSHOT_API_KEY=MOONSHOT_API_KEY:latest

            - name: "Show output"
              run: |
                  echo "${{ steps.deploy-frontend.outputs.url || steps.deploy-microservice.outputs.url }}"
