steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'europe-west1-docker.pkg.dev/ulejraai/cloud-run-source-deploy/ulejraai/frontend:$COMMIT_SHA'
      - '-f'
      - 'frontend/Dockerfile'
      - 'frontend'


  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'europe-west1-docker.pkg.dev/ulejraai/cloud-run-source-deploy/ulejraai/frontend:$COMMIT_SHA'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'frontend'
      - '--image=europe-west1-docker.pkg.dev/ulejraai/cloud-run-source-deploy/ulejraai/frontend:$COMMIT_SHA'
      - '--region=europe-west1'
      - '--platform=managed'
      - '--set-env-vars=AUTH_TRUST_HOST=true,EXTERNAL_BACKEND_URL=https://api.saloneledger.com'
      - '--update-secrets=POSTGRES_URL=POSTGRES_URL:latest,AUTH_SECRET=AUTH_SECRET:latest,NEXTAUTH_SECRET=NEXTAUTH_SECRET:latest,MOONSHOT_API_KEY=MOONSHOT_API_KEY:latest,ALPHAVANTAGE_API_KEY=ALPHAVANTAGE_API_KEY:latest,COINMARKETCAP_API_KEY=COINMARKETCAP_API_KEY:latest,SMITHERY_API_KEY=SMITHERY_API_KEY:latest,TAVILY_API_KEY=TAVILY_API_KEY:latest'

images:
  - 'europe-west1-docker.pkg.dev/ulejraai/cloud-run-source-deploy/ulejraai/frontend:$COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY
